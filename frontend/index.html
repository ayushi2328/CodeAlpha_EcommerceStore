<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeAlpha E-commerce Store</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <nav class="navbar">
        <h2 class="logo">🛒 CodeAlpha E-commerce Store</h2>

        <input type="text" id="searchInput" placeholder="Search products..." />

        <div class="nav-right">
            <span id="cartCount">Cart: 0</span>

            <span id="userInfo"
                style="font-weight: bold; margin-left: 15px;">
            </span>

            <button id="logoutBtn" class="hidden">
                Logout
            </button>
        </div>
    </nav>

    <div class="container">

        <!-- AUTH SECTION -->
        <div class="form-section" id="authSection">

            <h2>User Login & Registration</h2>

            <div class="auth-container">

                <input
                    type="text"
                    id="authName"
                    placeholder="Name"
                />

                <input
                    type="email"
                    id="authEmail"
                    placeholder="Email"
                />

                <input
                    type="password"
                    id="authPassword"
                    placeholder="Password"
                />

                <div class="auth-buttons">

                    <button
                        type="button"
                        onclick="handleAuth('signup')"
                    >
                        Register
                    </button>

                    <button
                        type="button"
                        onclick="handleAuth('login')"
                    >
                        Login
                    </button>

                </div>

            </div>
        </div>

        <!-- PRODUCT FORM -->
        <div class="form-section">

            <h2 id="formTitle">Add New Product</h2>

            <form id="productForm">

                <input
                    type="text"
                    id="name"
                    placeholder="Product Name"
                    required
                />

                <input
                    type="number"
                    id="price"
                    placeholder="Price"
                    required
                />

                <input
                    type="text"
                    id="description"
                    placeholder="Description"
                    required
                />

                <button type="submit" id="submitBtn">
                    Save Product
                </button>

            </form>
        </div>

        <!-- PRODUCTS -->
        <h1 class="title">Our Products</h1>

        <div
            class="products-container"
            id="productsContainer">
        </div>

        <!-- CART -->
        <div class="cart-container">

            <h2>🛍️ Shopping Cart</h2>

            <div id="cartItems"></div>

            <h3 id="cartTotal">Total: ₹0</h3>

            <button
                id="checkoutBtn"
                onclick="checkout()"
            >
                Checkout
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
